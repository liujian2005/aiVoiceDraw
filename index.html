<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 语音绘图 | VoiceDraw</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>" />
</head>
<body>

  <!-- ====== 顶栏 ====== -->
  <header class="topbar">
    <div class="logo">🎙️ VoiceDraw</div>
    <div class="status-area">
      <span id="status-dot" class="status-dot idle"></span>
      <span id="status-text">💤 说「你好」唤醒我</span>
    </div>
  </header>

  <!-- ====== 主体 ====== -->
  <main class="main-layout">

    <!-- 画布区 -->
    <section class="canvas-area">
      <div class="sketchbook">
        <canvas id="main-canvas"></canvas>
      </div>
      <!-- 语音光标 -->
      <div class="voice-cursor" id="voice-cursor" style="left:50%; top:50%;"></div>
    </section>

    <!-- 侧面板 -->
    <aside class="side-panel">

      <!-- 唤醒状态 -->
      <div class="mic-section">
        <div class="wake-indicator" id="wake-indicator">
          <span class="wake-icon">💤</span>
          <span class="wake-label">说「你好」唤醒</span>
        </div>
        <p class="mic-hint">唤醒后直接说出你想画的内容</p>
      </div>

      <!-- 语音识别文本 -->
      <div class="transcript-box">
        <div class="panel-title">🗣️ 语音识别</div>
        <div class="interim-text" id="interim-text"></div>
        <div class="final-text" id="final-text">等待说话...</div>
      </div>

      <!-- 指令解析 -->
      <div class="command-box">
        <div class="panel-title">⚙️ 指令解析</div>
        <div class="command-display" id="command-display">
          说「你好」开始，说「停下」结束
        </div>
      </div>

      <!-- 操作历史 -->
      <div class="history-box">
        <div class="panel-title">📋 操作历史</div>
        <ul class="history-list" id="history-list"></ul>
      </div>

      <!-- 画笔状态 -->
      <div class="brush-state">
        <div class="panel-title">🖌️ 当前画笔</div>
        <div class="state-grid">
          <div class="state-item">
            <span class="state-label">颜色</span>
            <span class="state-value" id="state-color">
              <span class="color-preview" id="color-preview" style="background:#e74c3c"></span>红色
            </span>
          </div>
          <div class="state-item">
            <span class="state-label">大小</span>
            <span class="state-value" id="state-size">50px</span>
          </div>
          <div class="state-item">
            <span class="state-label">位置</span>
            <span class="state-value" id="state-position">中央</span>
          </div>
        </div>
      </div>

    </aside>
  </main>

  <!-- Toast -->
  <div class="toast show" id="toast">🎙️ 说「你好」唤醒我</div>

  <!-- ====== JS 模块 ====== -->
  <script src="js/config.js"></script>
  <script src="js/colorMap.js"></script>
  <script src="js/voiceEngine.js"></script>
  <script src="js/drawEngine.js"></script>
  <script src="js/commandParser.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
