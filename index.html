<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 语音绘图工具 | VoiceDraw</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ====== 顶栏 ====== -->
  <header class="topbar">
    <div class="logo">🎙️ VoiceDraw</div>
    <div class="status-area">
      <span id="status-dot" class="status-dot idle"></span>
      <span id="status-text">等待语音指令...</span>
    </div>
  </header>

  <!-- ====== 主体 ====== -->
  <main class="main-layout">

    <!-- 画布区 -->
    <section class="canvas-area">
      <div class="sketchbook">
        <canvas id="main-canvas"></canvas>
      </div>
    </section>

    <!-- 侧面板 — 仅麦克风按钮 -->
    <aside class="side-panel">
      <div class="mic-section">
        <button class="mic-btn" id="mic-btn">
          <span class="mic-icon">🎙️</span>
          <span class="mic-label">按住说话</span>
        </button>
        <p class="mic-hint">或按 <kbd>空格键</kbd> 激活语音</p>
      </div>
    </aside>

  </main>

</body>
</html>
